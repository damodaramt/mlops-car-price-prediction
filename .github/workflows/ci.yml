name: FastAPI ML CI Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Build Docker image
      run: |
        docker build -t car-mlops-api .

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag Docker image
      run: |
        docker tag car-mlops-api ${{ secrets.DOCKER_USERNAME }}/car-mlops-api:latest

    - name: Push Docker image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/car-mlops-api:latest
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      docker pull ${{ secrets.DOCKER_USERNAME }}/car-mlops-api:latest

      docker stop car-mlops-api || true
      docker rm car-mlops-api || true

      docker run -d \
        -p 8000:8000 \
        --name car-mlops-api \
        --network car-mlops-production_default \
        -e AWS_ACCESS_KEY_ID=admin \
        -e AWS_SECRET_ACCESS_KEY=password123 \
        -e AWS_DEFAULT_REGION=us-east-1 \
        -e MLFLOW_S3_ENDPOINT_URL=http://mlflow-minio:9000 \
        -e MLFLOW_TRACKING_URI=http://mlflow-server:5000 \
        ${{ secrets.DOCKER_USERNAME }}/car-mlops-api:latest
          docker rm car-mlops-api || true
          docker run -d -p 8000:8000 --name car-mlops-api \
          ${{ secrets.DOCKER_USERNAME }}/car-mlops-api:latest
